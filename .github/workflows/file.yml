name: Download Local Torrent and Upload Release

on:
  push:
    branches:
      - "**"

jobs:
  save-file:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y aria2 zip unzip file

      - name: Parse commit message and download local torrent
        shell: bash
        run: |
          set -Eeuo pipefail
          shopt -s nullglob dotglob

          MSG="$(git log -1 --pretty=%B)"

          echo "Commit message:"
          echo "----------------------------------------"
          printf '%s\n' "$MSG"
          echo "----------------------------------------"

          MODE=""
          TIMEOUT_VALUE=""
          TORRENT_PATH=""

          while IFS= read -r line; do
            case "$line" in
              download-zip-small:*)
                MODE="zip"
                TIMEOUT_VALUE="7m"
                TORRENT_PATH="${line#download-zip-small:}"
                break
                ;;
              download-zip-big:*)
                MODE="zip"
                TIMEOUT_VALUE="15m"
                TORRENT_PATH="${line#download-zip-big:}"
                break
                ;;
              download-small:*)
                MODE="normal"
                TIMEOUT_VALUE="7m"
                TORRENT_PATH="${line#download-small:}"
                break
                ;;
              download-big:*)
                MODE="normal"
                TIMEOUT_VALUE="15m"
                TORRENT_PATH="${line#download-big:}"
                break
                ;;
            esac
          done <<< "$MSG"

          TORRENT_PATH="$(echo "$TORRENT_PATH" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

          if [ -z "$TORRENT_PATH" ]; then
            echo "❌ No download command found in commit message."
            echo
            echo "Use one of:"
            echo "  download-small: downloads/file.torrent"
            echo "  download-big: downloads/file.torrent"
            echo "  download-zip-small: downloads/file.torrent"
            echo "  download-zip-big: downloads/file.torrent"
            exit 1
          fi

          echo "✅ Mode: $MODE"
          echo "✅ Timeout: $TIMEOUT_VALUE"
          echo "✅ Torrent path: $TORRENT_PATH"

          if [ ! -f "$TORRENT_PATH" ]; then
            echo "❌ Torrent file not found in repository: $TORRENT_PATH"
            echo
            echo "Available files:"
            find . -maxdepth 5 -type f | sort || true
            exit 1
          fi

          echo "🔍 Torrent file info:"
          file "$TORRENT_PATH" || true

          echo "🧹 Cleaning generated folders only..."
          rm -rf tmp_downloads prepared_outputs release_files logs split_tmp

          mkdir -p tmp_downloads prepared_outputs release_files logs

          echo "⬇️ Starting torrent download..."
          if ! timeout "$TIMEOUT_VALUE" aria2c \
            --continue=true \
            --max-tries=1 \
            --retry-wait=5 \
            --timeout=30 \
            --connect-timeout=30 \
            --bt-tracker-timeout=30 \
            --bt-tracker-connect-timeout=30 \
            --bt-stop-timeout=180 \
            --seed-time=0 \
            --follow-torrent=true \
            --bt-save-metadata=true \
            --dir="tmp_downloads" \
            --log="logs/aria2.log" \
            "$TORRENT_PATH"; then

            echo "❌ Torrent download failed."

            if grep -qi "not allowed to download" logs/aria2.log; then
              echo "❌ Tracker denied access."
              echo "This means the tracker rejected the GitHub runner."
              echo "If it is a private tracker, the torrent/passkey/account may not allow this download."
            fi

            echo
            echo "----- aria2 log -----"
            cat logs/aria2.log || true
            echo "---------------------"

            exit 1
          fi

          echo "📁 Download tree:"
          find tmp_downloads -maxdepth 5 -print || true

          echo "🔎 Downloaded file types:"
          find tmp_downloads -maxdepth 5 -type f -exec file {} \; || true

          HAS_REAL_CONTENT=0

          while IFS= read -r f; do
            base="$(basename "$f")"

            if [[ "$base" != *.torrent ]]; then
              HAS_REAL_CONTENT=1
              break
            fi
          done < <(find tmp_downloads -type f)

          if [ "$HAS_REAL_CONTENT" -eq 0 ]; then
            echo "❌ No actual downloaded content found."
            echo "Only torrent metadata or nothing was downloaded."
            echo
            echo "Possible causes:"
            echo "  - tracker denied access"
            echo "  - no peers"
            echo "  - torrent has no downloadable payload"
            echo "  - timeout was too short"
            echo
            echo "----- aria2 log -----"
            cat logs/aria2.log || true
            echo "---------------------"

            exit 1
          fi

          echo "🧹 Removing leftover .torrent files from downloaded content only..."
          find tmp_downloads -type f -name "*.torrent" -delete

          echo "📁 Content after cleanup:"
          find tmp_downloads -maxdepth 5 -print || true

          if [ "$MODE" = "zip" ]; then
            if [ -z "$(find tmp_downloads -mindepth 1 -print -quit)" ]; then
              echo "❌ No files downloaded to archive."
              exit 1
            fi

            ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S).zip"

            echo "📦 Creating archive: $ARCHIVE_NAME"

            (
              cd tmp_downloads
              zip -r "../prepared_outputs/$ARCHIVE_NAME" .
            )
          else
            echo "📤 Preparing downloaded outputs..."

            while IFS= read -r ITEM; do
              BASENAME="$(basename "$ITEM")"

              if [ -d "$ITEM" ]; then
                echo "📁 Found directory: $BASENAME"
                echo "📦 Zipping directory..."

                (
                  cd tmp_downloads
                  zip -r "../prepared_outputs/${BASENAME}.zip" "$BASENAME"
                )

              elif [ -f "$ITEM" ]; then
                echo "✅ Copying file: $BASENAME"
                cp "$ITEM" "prepared_outputs/$BASENAME"
              fi
            done < <(find tmp_downloads -mindepth 1 -maxdepth 1)
          fi

          if [ -z "$(find prepared_outputs -type f -print -quit)" ]; then
            echo "❌ No output files prepared."
            exit 1
          fi

          echo "📁 Prepared outputs:"
          ls -lah prepared_outputs

          echo "📦 Splitting outputs into GitHub-release-safe assets..."
          SPLIT_SIZE="950m"

          for FILE in prepared_outputs/*; do
            [ -f "$FILE" ] || continue

            BASENAME="$(basename "$FILE")"

            SAFE_NAME="$(echo "$BASENAME" | tr ' /' '__')"

            echo "Processing output: $BASENAME"

            rm -rf split_tmp
            mkdir -p split_tmp

            cp "$FILE" "split_tmp/$BASENAME"

            (
              cd split_tmp
              zip -s "$SPLIT_SIZE" -r "../release_files/${SAFE_NAME}.zip" "$BASENAME"
            )

            rm -rf split_tmp
          done

          if [ -z "$(find release_files -type f -print -quit)" ]; then
            echo "❌ No release assets were created."
            exit 1
          fi

          echo "📁 Release assets:"
          ls -lah release_files

          TAG="download-$(date +%Y%m%d-%H%M%S)-${GITHUB_RUN_NUMBER}"
          TITLE="Downloaded files $TAG"

          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_TITLE=$TITLE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          body: |
            Automated release created from a local torrent file in the repository.

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

            Torrent path was read from the commit message.
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
