- name: Extract torrent path and download
  shell: bash
  run: |
    set -euo pipefail

    MSG="$(git log -1 --pretty=%B)"

    echo "Commit message:"
    echo "----------------------------------------"
    printf '%s\n' "$MSG"
    echo "----------------------------------------"

    MODE=""
    TORRENT_PATH=""

    while IFS= read -r line; do
      case "$line" in
        download-big:*)
          MODE="normal"
          TORRENT_PATH="${line#download-big:}"
          break
          ;;
        download-small:*)
          MODE="normal"
          TORRENT_PATH="${line#download-small:}"
          break
          ;;
        download-zip-big:*)
          MODE="zip"
          TORRENT_PATH="${line#download-zip-big:}"
          break
          ;;
        download-zip-small:*)
          MODE="zip"
          TORRENT_PATH="${line#download-zip-small:}"
          break
          ;;
      esac
    done <<< "$MSG"

    TORRENT_PATH="$(echo "$TORRENT_PATH" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

    if [ -z "$TORRENT_PATH" ]; then
      echo "❌ No download command found in commit message"
      exit 1
    fi

    echo "✅ Mode: $MODE"
    echo "✅ Torrent path: $TORRENT_PATH"

    if [ ! -f "$TORRENT_PATH" ]; then
      echo "❌ Torrent file not found: $TORRENT_PATH"
      echo "Repository files near path:"
      find . -maxdepth 3 -type f | sort
      exit 1
    fi

    mkdir -p tmp_downloads downloads release_files logs

    aria2c \
      --continue=true \
      --max-tries=1 \
      --retry-wait=5 \
      --timeout=30 \
      --connect-timeout=30 \
      --bt-tracker-timeout=30 \
      --bt-tracker-connect-timeout=30 \
      --bt-stop-timeout=180 \
      --seed-time=0 \
      --follow-torrent=true \
      --bt-save-metadata=true \
      --dir="tmp_downloads" \
      --log="logs/aria2.log" \
      "$TORRENT_PATH"

    echo "Downloaded files:"
    find tmp_downloads -maxdepth 5 -print || true

    if [ -z "$(find tmp_downloads -type f ! -name '*.torrent' -print -quit)" ]; then
      echo "❌ No actual downloaded content found."
      echo "Possible causes:"
      echo "  - tracker denied access"
      echo "  - no peers"
      echo "  - torrent metadata only"
      exit 1
    fi
