name: Download from Commit & Upload to Release

on:
  push:
    branches:
      - "**"

jobs:
  save-file:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip unzip

      - name: Extract URLs, download files, and prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob dotglob

          MSG="$(git log -1 --pretty=%B)"
          echo "Commit message:"
          echo "----------------------------------------"
          echo "$MSG"
          echo "----------------------------------------"

          MODE=""
          TIMEOUT_VALUE=""
          URL_LINE=""

          if echo "$MSG" | grep -qP 'download-zip-small:\s*'; then
            MODE="zip"
            TIMEOUT_VALUE="7m"
            URL_LINE="$(echo "$MSG" | grep -oP 'download-zip-small:\s*\K.*' | head -n1)"
          elif echo "$MSG" | grep -qP 'download-zip-big:\s*'; then
            MODE="zip"
            TIMEOUT_VALUE="15m"
            URL_LINE="$(echo "$MSG" | grep -oP 'download-zip-big:\s*\K.*' | head -n1)"
          elif echo "$MSG" | grep -qP 'download-small:\s*'; then
            MODE="normal"
            TIMEOUT_VALUE="7m"
            URL_LINE="$(echo "$MSG" | grep -oP 'download-small:\s*\K.*' | head -n1)"
          elif echo "$MSG" | grep -qP 'download-big:\s*'; then
            MODE="normal"
            TIMEOUT_VALUE="15m"
            URL_LINE="$(echo "$MSG" | grep -oP 'download-big:\s*\K.*' | head -n1)"
          else
            echo "❌ No valid download command found."
            echo "Use one of:"
            echo "  download-small: <url-or-magnet>"
            echo "  download-big: <url-or-magnet>"
            echo "  download-zip-small: <url-or-magnet>"
            echo "  download-zip-big: <url-or-magnet>"
            exit 1
          fi

          if [ -z "${URL_LINE// }" ]; then
            echo "❌ Download command found, but no URL/magnet provided."
            exit 1
          fi

          echo "Mode: $MODE"
          echo "Timeout: $TIMEOUT_VALUE"

          rm -rf downloads tmp_downloads release_files split_tmp
          mkdir -p downloads tmp_downloads release_files

          download_one() {
            local url="$1"

            echo "⬇️ Downloading:"
            echo "   $url"
            echo "   timeout: $TIMEOUT_VALUE"

            timeout "$TIMEOUT_VALUE" aria2c \
              --continue=true \
              --max-tries=1 \
              --retry-wait=5 \
              --timeout=30 \
              --connect-timeout=30 \
              --bt-tracker-timeout=30 \
              --bt-tracker-connect-timeout=30 \
              --bt-stop-timeout=180 \
              --seed-time=0 \
              --follow-torrent=mem \
              --bt-save-metadata=true \
              --dir="tmp_downloads" \
              "$url"
          }

          while IFS= read -r URL; do
            [ -n "${URL// }" ] || continue
            if ! download_one "$URL"; then
              echo "❌ Download failed or timed out: $URL"
              exit 1
            fi
          done <<< "$URL_LINE"

          echo "📁 Raw downloaded content:"
          find tmp_downloads -maxdepth 4 -print || true

          echo "🔎 File type inspection:"
          find tmp_downloads -maxdepth 4 -type f -exec file {} \; || true

          HAS_REAL_CONTENT=0
          while IFS= read -r f; do
            base="$(basename "$f")"
            if [[ "$base" != *.torrent ]]; then
              HAS_REAL_CONTENT=1
              break
            fi
          done < <(find tmp_downloads -type f)

          if [ "$HAS_REAL_CONTENT" -eq 0 ]; then
            echo "❌ No real downloaded payload found."
            echo "Only .torrent metadata or no files were downloaded."
            exit 1
          fi

          echo "🧹 Removing leftover .torrent files..."
          find tmp_downloads -type f -name "*.torrent" -delete

          echo "📁 Downloaded content after cleanup:"
          find tmp_downloads -maxdepth 4 -print || true

          if [ "$MODE" = "zip" ]; then
            if [ -z "$(find tmp_downloads -mindepth 1 -print -quit)" ]; then
              echo "❌ No files downloaded to archive."
              exit 1
            fi

            ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S).zip"

            echo "📦 Creating archive from downloaded content: $ARCHIVE_NAME"
            (
              cd tmp_downloads
              zip -r "../downloads/$ARCHIVE_NAME" .
            )
          else
            echo "📤 Preparing normal output..."

            if [ -z "$(find tmp_downloads -mindepth 1 -print -quit)" ]; then
              echo "❌ No downloaded content found."
              exit 1
            fi

            while IFS= read -r ITEM; do
              BASENAME="$(basename "$ITEM")"

              if [ -d "$ITEM" ]; then
                echo "📁 Torrent produced folder: $BASENAME"
                echo "📦 Zipping folder so it can be stored cleanly..."
                (
                  cd tmp_downloads
                  zip -r "../downloads/${BASENAME}.zip" "$BASENAME"
                )
              elif [ -f "$ITEM" ]; then
                echo "✅ Copying downloaded file: $BASENAME"
                cp "$ITEM" "downloads/$BASENAME"
              fi
            done < <(find tmp_downloads -mindepth 1 -maxdepth 1)
          fi

          rm -rf tmp_downloads

          echo "📦 Preparing release assets (split under 1 GB)..."
          SPLIT_SIZE="950m"

          for FILE in downloads/*; do
            [ -f "$FILE" ] || continue

            BASENAME="$(basename "$FILE")"
            echo "Processing: $BASENAME"

            rm -rf split_tmp
            mkdir -p split_tmp
            cp "$FILE" "split_tmp/$BASENAME"

            (
              cd split_tmp
              zip -s "$SPLIT_SIZE" -r "../release_files/${BASENAME}.zip" "$BASENAME"
            )

            rm -rf split_tmp
          done

          if [ -z "$(find release_files -type f -print -quit)" ]; then
            echo "❌ No release assets were created."
            exit 1
          fi

          echo "📁 Final release assets:"
          ls -lah release_files

          TAG="download-$(date +%Y%m%d-%H%M%S)-${GITHUB_RUN_NUMBER}"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

          RELEASE_TITLE="Downloaded files $TAG"
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          body: |
            Automated release created from commit-triggered download workflow.

            Commit:
            ${{ github.sha }}

            Branch:
            ${{ github.ref_name }}
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
