name: Download from Commit & Save to Repo

on:
  push:
    branches:
      - "**"

jobs:
  save-file:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip unzip

      - name: Extract URLs, download files, and prepare outputs
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob dotglob

          MSG="$(git log -1 --pretty=%B)"
          echo "Commit message:"
          echo "----------------------------------------"
          echo "$MSG"
          echo "----------------------------------------"

          MODE=""
          TIMEOUT_VALUE=""
          URL_LINE=""

          if echo "$MSG" | grep -qP 'download-zip-small:\s*'; then
            MODE="zip"
            TIMEOUT_VALUE="7m"
            URL_LINE="$(echo "$MSG" | grep -oP 'download-zip-small:\s*\K.*')"
          elif echo "$MSG" | grep -qP 'download-zip-big:\s*'; then
            MODE="zip"
            TIMEOUT_VALUE="15m"
            URL_LINE="$(echo "$MSG" | grep -oP 'download-zip-big:\s*\K.*')"
          elif echo "$MSG" | grep -qP 'download-small:\s*'; then
            MODE="normal"
            TIMEOUT_VALUE="7m"
            URL_LINE="$(echo "$MSG" | grep -oP 'download-small:\s*\K.*')"
          elif echo "$MSG" | grep -qP 'download-big:\s*'; then
            MODE="normal"
            TIMEOUT_VALUE="15m"
            URL_LINE="$(echo "$MSG" | grep -oP 'download-big:\s*\K.*')"
          else
            echo "❌ No valid download command found."
            echo "Use one of:"
            echo "  download-small: <url-or-magnet>"
            echo "  download-big: <url-or-magnet>"
            echo "  download-zip-small: <url-or-magnet>"
            echo "  download-zip-big: <url-or-magnet>"
            exit 1
          fi

          if [ -z "${URL_LINE// }" ]; then
            echo "❌ Download command found, but no URL/magnet provided."
            exit 1
          fi

          echo "Mode: $MODE"
          echo "Timeout: $TIMEOUT_VALUE"

          mkdir -p downloads tmp_downloads

          download_one() {
            local url="$1"

            echo "⬇️ Downloading:"
            echo "   $url"
            echo "   timeout: $TIMEOUT_VALUE"

            timeout "$TIMEOUT_VALUE" aria2c \
              --continue=true \
              --max-tries=1 \
              --retry-wait=5 \
              --timeout=30 \
              --connect-timeout=30 \
              --bt-tracker-timeout=30 \
              --bt-tracker-connect-timeout=30 \
              --bt-stop-timeout=180 \
              --seed-time=0 \
              --follow-torrent=mem \
              --bt-save-metadata=false \
              --dir="tmp_downloads" \
              "$url"
          }

          for URL in $URL_LINE; do
            if ! download_one "$URL"; then
              echo "❌ Download failed or timed out: $URL"
              exit 1
            fi
          done

          echo "🧹 Removing leftover .torrent files, if any..."
          find tmp_downloads -type f -name "*.torrent" -delete

          echo "📁 Downloaded content:"
          find tmp_downloads -maxdepth 3 -print

          if [ "$MODE" = "zip" ]; then
            FILES=(tmp_downloads/*)

            if [ "${#FILES[@]}" -eq 0 ]; then
              echo "❌ No files downloaded to archive."
              exit 1
            fi

            ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S).zip"

            echo "📦 Creating one archive from downloaded content: $ARCHIVE_NAME"

            (
              cd tmp_downloads
              zip -r "../downloads/$ARCHIVE_NAME" .
            )

          else
            echo "📤 Preparing normal output..."

            ITEMS=(tmp_downloads/*)

            if [ "${#ITEMS[@]}" -eq 0 ]; then
              echo "❌ No downloaded content found."
              exit 1
            fi

            for ITEM in "${ITEMS[@]}"; do
              BASENAME="$(basename "$ITEM")"

              if [ -d "$ITEM" ]; then
                echo "📁 Torrent produced folder: $BASENAME"
                echo "📦 Zipping folder so it can be stored cleanly..."

                (
                  cd tmp_downloads
                  zip -r "../downloads/${BASENAME}.zip" "$BASENAME"
                )

              elif [ -f "$ITEM" ]; then
                echo "✅ Copying downloaded file: $BASENAME"
                cp "$ITEM" "downloads/$BASENAME"
              fi
            done
          fi

          rm -rf tmp_downloads

          echo "🔍 Checking files larger than 90 MB..."
          LIMIT=$((90 * 1024 * 1024))
          mkdir -p final_downloads

          for FILE in downloads/*; do
            [ -f "$FILE" ] || continue

            SIZE="$(stat -c%s "$FILE")"
            BASENAME="$(basename "$FILE")"

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ Splitting large file: $BASENAME ($(( SIZE / 1024 / 1024 )) MB)"

              rm -rf split_tmp
              mkdir -p split_tmp
              cp "$FILE" "split_tmp/$BASENAME"

              (
                cd split_tmp
                zip -s 90m -r "../final_downloads/${BASENAME}.zip" "$BASENAME"
              )

              rm -rf split_tmp
            else
              echo "✅ Keeping file without split: $BASENAME"
              cp "$FILE" "final_downloads/$BASENAME"
            fi
          done

          rm -rf downloads
          mv final_downloads downloads

          echo "📁 Final files in downloads/:"
          ls -lah downloads || true

      - name: Commit & Push
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "Add downloaded files from commit [skip ci]"
          echo "🚀 Pushing to branch: $BRANCH"
          git push origin "HEAD:$BRANCH"
